<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MiroThinker ADK — Execution Dashboard</title>
  <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body>

  <!-- ── Header ───────────────────────────────────────────────────────── -->
  <div class="header">
    <div>
      <h1>MiroThinker <span>ADK</span> Dashboard</h1>
    </div>
    <div class="header-right">
      <span id="status-dot" class="status-dot idle"></span>
      <span id="status-text">Initialising...</span>
    </div>
  </div>

  <!-- ── Dashboard Layout ─────────────────────────────────────────────── -->
  <div class="dashboard">

    <!-- Sidebar Navigation -->
    <nav class="sidebar">
      <div class="sidebar-item active" data-panel="timeline">Timeline</div>
      <div class="sidebar-item" data-panel="algorithms">Algorithms</div>
      <div class="sidebar-item" data-panel="tools">Tool Calls</div>
      <div class="sidebar-item" data-panel="context">Context Window</div>
      <div class="sidebar-item" data-panel="agents">Agent Graph</div>
      <div class="sidebar-item" data-panel="answers">Answers</div>
      <div class="sidebar-item" data-panel="posthoc">Post-Hoc Stats</div>
    </nav>

    <!-- Main Content -->
    <div class="main-content">

      <!-- KPI Cards (always visible) -->
      <div id="kpi-container" class="kpi-grid"></div>

      <!-- Panel: Timeline -->
      <div id="panel-timeline" class="panel active">
        <div class="panel-title">Turn Timeline</div>
        <div id="timeline-container" style="max-height:calc(100vh - 250px);overflow-y:auto;"></div>
      </div>

      <!-- Panel: Algorithms -->
      <div id="panel-algorithms" class="panel">
        <div class="panel-title">Algorithm Activity Log</div>
        <div id="algorithms-container" style="max-height:calc(100vh - 250px);overflow-y:auto;"></div>
      </div>

      <!-- Panel: Tool Calls -->
      <div id="panel-tools" class="panel">
        <div class="panel-title">Tool Calls</div>
        <div id="tool-calls-container" style="max-height:calc(100vh - 250px);overflow-y:auto;"></div>
      </div>

      <!-- Panel: Context Window -->
      <div id="panel-context" class="panel">
        <div class="panel-title">Context Window</div>
        <div id="context-container"></div>
      </div>

      <!-- Panel: Agent Graph -->
      <div id="panel-agents" class="panel">
        <div class="panel-title">Agent Hierarchy</div>
        <div id="agent-graph-container"></div>
      </div>

      <!-- Panel: Answers -->
      <div id="panel-answers" class="panel">
        <div class="panel-title">Intermediate Answers</div>
        <div id="answers-container"></div>
      </div>

      <!-- Panel: Post-Hoc Stats -->
      <div id="panel-posthoc" class="panel">
        <div class="panel-title">Post-Hoc Analysis</div>
        <div id="posthoc-container">
          <div class="no-data">Stats will appear after the session completes</div>
        </div>
      </div>

    </div>
  </div>

  <!-- ── Scripts ──────────────────────────────────────────────────────── -->
  <script src="/static/js/lib/sse.js"></script>
  <script src="/static/js/panels/kpi.js"></script>
  <script src="/static/js/panels/timeline.js"></script>
  <script src="/static/js/panels/agent_graph.js"></script>
  <script src="/static/js/panels/tool_calls.js"></script>
  <script src="/static/js/panels/context.js"></script>
  <script src="/static/js/panels/algorithms.js"></script>
  <script src="/static/js/panels/answers.js"></script>
  <script src="/static/js/app.js"></script>

</body>
</html>
